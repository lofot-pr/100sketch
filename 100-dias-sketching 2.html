<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF9F6;
  --warm-white: #FFFEF9;
  --brown: #8B7355;
  --brown-hover: #7A6347;
  --brown-light: #F2EDE4;
  --dark: #1C1917;
  --mid: #57534E;
  --light: #A8A29E;
  --lighter: #D6D3D1;
  --border: #E7E5E4;
  --sage: #6B7B5E;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
  font-weight: 300;
}

/* ── HEADER ── */
header {
  padding: 2.5rem 2rem 1.75rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: var(--warm-white);
}
header h1 {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--dark);
  margin-bottom: 0.2rem;
}
.header-sub {
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--light);
  margin-bottom: 1.75rem;
}
.progress-wrap { max-width: 280px; margin: 0 auto; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--light);
  margin-bottom: 0.5rem;
  letter-spacing: 0.04em;
}
.progress-track {
  height: 1px;
  background: var(--border);
}
.progress-fill {
  height: 100%;
  background: var(--brown);
  transition: width 0.6s ease;
}

/* ── CALENDAR WRAPPER ── */
.cal-wrapper {
  max-width: 460px;
  margin: 2rem auto;
  padding: 0 1.5rem 4rem;
}

/* ── MONTH NAV ── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
}
.month-nav h2 {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--dark);
}
.nav-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  color: var(--mid);
  font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  line-height: 1;
}
.nav-btn:hover { background: var(--brown-light); border-color: var(--brown); color: var(--brown); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-btn:disabled:hover { background: none; border-color: var(--border); color: var(--mid); }

/* ── WEEKDAY HEADERS ── */
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 0.4rem;
}
.cal-weekday {
  text-align: center;
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--lighter);
  padding: 0.4rem 0;
}

/* ── CALENDAR GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-cell {
  aspect-ratio: 1;
  min-height: 40px; /* fallback iOS */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  position: relative;
  transition: background 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.cal-cell.empty { pointer-events: none; }

/* date number */
.cal-date {
  font-size: 0.82rem;
  line-height: 1;
  color: var(--lighter); /* default: non-challenge */
  font-weight: 300;
}

/* locked future challenge day */
.cal-cell.locked .cal-date {
  color: var(--lighter);
}
/* very subtle indicator that a future day is a challenge day */
.cal-cell.locked::before {
  content: '';
  position: absolute;
  bottom: 5px;
  width: 3px; height: 3px;
  background: var(--lighter);
  border-radius: 50%;
}

/* unlocked past/current challenge day */
.cal-cell.available {
  cursor: pointer;
}
.cal-cell.available .cal-date {
  color: var(--dark);
  font-weight: 400;
}
.cal-cell.available:hover {
  background: var(--brown-light);
}
.cal-cell.available:hover .cal-date {
  color: var(--brown);
}

/* today */
.cal-cell.today .cal-date {
  width: 26px; height: 26px;
  background: var(--brown);
  color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 400;
}

/* completed indicator */
.cal-cell.done::after {
  content: '';
  position: absolute;
  bottom: 4px;
  width: 4px; height: 4px;
  background: var(--sage);
  border-radius: 50%;
}
/* don't show locked dot when done */
.cal-cell.done.locked::before { display: none; }

/* day number label (only for available) */
.cal-label {
  font-size: 0.58rem;
  color: var(--brown);
  opacity: 0.6;
  margin-top: 1px;
  letter-spacing: 0.02em;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.68rem;
  color: var(--light);
  letter-spacing: 0.06em;
}
.l-dot { width: 8px; height: 8px; border-radius: 50%; }
.l-today { background: var(--brown); }
.l-done { background: var(--sage); }
.l-available { background: var(--dark); }

/* ── MODAL OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(28,25,23,0.35);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 1.25rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}

/* ── MODAL CARD ── */
.modal {
  background: var(--warm-white);
  border-radius: 14px;
  padding: 2.25rem 2.25rem 2rem;
  max-width: 420px;
  width: 100%;
  position: relative;
  max-height: 92vh;
  overflow-y: auto;
  transform: translateY(18px);
  transition: transform 0.24s cubic-bezier(0.22,1,0.36,1);
}
.overlay.open .modal { transform: translateY(0); }

/* scrollbar */
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  color: var(--lighter); font-size: 1.1rem;
  line-height: 1; padding: 0.2rem;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--mid); }

/* header row */
.modal-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
.modal-num {
  font-family: var(--serif);
  font-size: 3.2rem;
  font-weight: 300;
  color: var(--brown);
  line-height: 1;
  min-width: 2.4rem;
}
.modal-meta { display: flex; flex-direction: column; gap: 0.3rem; padding-top: 0.5rem; }
.modal-date {
  font-size: 0.74rem;
  color: var(--light);
  letter-spacing: 0.05em;
}
.modal-tag {
  font-size: 0.63rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--brown);
  background: var(--brown-light);
  padding: 0.18rem 0.55rem;
  border-radius: 3px;
  display: inline-block;
}

.modal-title {
  font-family: var(--serif);
  font-size: 1.85rem;
  font-weight: 400;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 0.75rem;
}
.modal-desc {
  font-size: 0.86rem;
  color: var(--mid);
  line-height: 1.7;
  margin-bottom: 1.75rem;
  font-weight: 300;
}

.modal-divider { height: 1px; background: var(--border); margin-bottom: 1.25rem; }

.refs-heading {
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--light);
  margin-bottom: 0.75rem;
}
.ref-btns { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.ref-btn {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 5px;
  text-decoration: none;
  font-size: 0.78rem;
  font-family: var(--sans);
  font-weight: 300;
  color: var(--mid);
  background: var(--warm-white);
  transition: all 0.18s;
  letter-spacing: 0.02em;
}
.ref-btn:hover { border-color: var(--brown); color: var(--brown); background: var(--brown-light); }
.ref-btn svg { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.6; }

.done-btn {
  width: 100%;
  padding: 0.7rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--mid);
  transition: all 0.2s;
}
.done-btn:hover { background: var(--sage); border-color: var(--sage); color: white; }
.done-btn.is-done { background: var(--sage); border-color: var(--sage); color: white; }

/* ── INSTALL BANNER ── */
.install-banner {
  display: none;
  background: var(--brown-light);
  border-bottom: 1px solid #E2D9CC;
  padding: 0.65rem 1rem 0.65rem 1.25rem;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  font-size: 0.75rem;
  color: var(--mid);
  letter-spacing: 0.02em;
  line-height: 1.4;
}
.install-banner.visible { display: flex; }
.install-banner strong { color: var(--brown); }
.install-dismiss {
  background: none; border: none; cursor: pointer;
  color: var(--light); font-size: 0.9rem; flex-shrink: 0;
  padding: 0.15rem;
}

@media (max-width: 480px) {
  header { padding: 1.75rem 1.25rem 1.5rem; }
  header h1 { font-size: 1.6rem; }
  .cal-wrapper { padding: 0 0.75rem 3rem; }
  .modal { padding: 1.75rem 1.25rem 1.75rem; }
  .modal-num { font-size: 2.6rem; }
  .modal-title { font-size: 1.55rem; }
  .cal-grid { gap: 2px; }
  .ref-btns { flex-direction: column; }
  .ref-btn { width: 100%; justify-content: center; padding: 0.65rem 1rem; }
  .done-btn { padding: 0.85rem; font-size: 0.85rem; }
}
</style>
</head>
<body>

<!-- INSTALL BANNER (móvil, solo en browser, no cuando ya está instalada) -->
<div class="install-banner" id="installBanner">

<script>

// DATA — 100 días
// ═══════════════════════════════════════
const DAYS = [
  // ── BLOQUE 1: FUNDAMENTOS (1–25) ──
  {b:1, t:"Cubo", d:"El punto de partida. Dibuja un cubo con líneas precisas y trabaja cada cara con un valor de gris distinto. La arista más cercana, la más oscura.", p:"wooden cube object photography still life", s:"cube biro pen shading illustration tutorial"},
  {b:1, t:"Esfera", d:"La forma más difícil de dominar. El reto no es el contorno, sino el gradiente que la hace parecer tridimensional.", p:"sphere ball photography still life lighting", s:"sphere biro pen shading illustration"},

const BLOCK_NAMES = {
  1: "Fundamentos · Días 1–25",
  2: "Exploración · Días 26–50",
  3: "Técnica · Días 51–75",
  4: "Maestría · Días 76–100",
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
// Día 1 fijado: 5 de junio de 2026
// Usamos constructor numérico (mes 0-indexado) para compatibilidad iOS Safari
const START = new Date(2026, 5, 5); // 5 = junio

let completed = new Set(JSON.parse(localStorage.getItem('sk100_done') || '[]'));
// Current calendar month (starts at the month containing today)
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();

let activeDay = null;

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
// Nombres de meses y días en español (evita dependencia de toLocaleDateString en iOS)
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_MIN = ['enero','febrero','marzo','abril','mayo','junio',
                   'julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_SEMANA = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
// Usa hora local (no UTC) para evitar desfase horario en España
function ymd(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// Returns challenge day number (1-100) for a date, or null
function dayNum(date) {
  const diff = Math.round((date - START) / 86400000);
  return diff >= 0 && diff < 100 ? diff + 1 : null;
}

// Returns the calendar date for challenge day N
function dayDate(n) {
  const d = new Date(START); d.setDate(d.getDate() + n - 1); return d;
}

function isUnlocked(n) { return dayDate(n) <= today(); }

function formatFullDate(d) {
  return DIAS_SEMANA[d.getDay()] + ', ' + d.getDate() +
    ' de ' + MESES_MIN[d.getMonth()] + ' de ' + d.getFullYear();
}

function pin(q) { return 'https://www.pinterest.com/search/pins/?q=' + encodeURIComponent(q); }

// Min/max months for navigation
function minMonth() { return { y: START.getFullYear(), m: START.getMonth() }; }
function maxMonth() {
  const end = dayDate(100);
  return { y: end.getFullYear(), m: end.getMonth() };
}

// ═══════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════
function renderCalendar() {
  const t = today();
  const todayStr = ymd(t);

  // Month title (sin toLocaleDateString para compatibilidad iOS)
  document.getElementById('monthTitle').textContent =
    MESES[viewMonth] + ' ' + viewYear;

  // Nav button states
  const min = minMonth(), max = maxMonth();
  document.getElementById('btnPrev').disabled =
    viewYear < min.y || (viewYear === min.y && viewMonth <= min.m);
  document.getElementById('btnNext').disabled =
    viewYear > max.y || (viewYear === max.y && viewMonth >= max.m);

  // Build grid
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1);
  let dow = firstDay.getDay(); // 0=Sun
  dow = dow === 0 ? 6 : dow - 1; // Mon=0 … Sun=6

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  // Empty leading cells
  for (let i = 0; i < dow; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell empty'; grid.appendChild(c);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const dn = dayNum(date);
    const isToday = ymd(date) === todayStr;
    const unlocked = dn ? isUnlocked(dn) : false;
    const isDone = dn ? completed.has(dn) : false;

    const c = document.createElement('div');
    const cls = ['cal-cell'];
    if (dn && unlocked) cls.push('available');
    else if (dn && !unlocked) cls.push('locked');
    if (isToday) cls.push('today');
    if (isDone) cls.push('done');
    c.className = cls.join(' ');

    const dateEl = document.createElement('span');
    dateEl.className = 'cal-date';
    dateEl.textContent = d;
    c.appendChild(dateEl);

    if (dn && unlocked && !isToday) {
      const lbl = document.createElement('span');
      lbl.className = 'cal-label';
      lbl.textContent = dn;
      c.appendChild(lbl);
    }
    if (isToday && dn) {
      const lbl = document.createElement('span');
      lbl.className = 'cal-label';
      lbl.textContent = dn;
      c.appendChild(lbl);
    }

    if (dn && unlocked) {
      c.addEventListener('click', () => openModal(dn));
    }

    grid.appendChild(c);
  }

  updateProgress();
}

// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
function updateProgress() {
  const done = completed.size;
  document.getElementById('pDone').textContent = done + ' completado' + (done !== 1 ? 's' : '');
  document.getElementById('pLeft').textContent = (100 - done) + ' restante' + (100 - done !== 1 ? 's' : '');
  document.getElementById('pFill').style.width = done + '%';
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openModal(n) {
  activeDay = n;
  const day = DAYS[n - 1];

  document.getElementById('mNum').textContent = n;
  document.getElementById('mDate').textContent = formatFullDate(dayDate(n));
  document.getElementById('mTag').textContent = BLOCK_NAMES[day.b];
  document.getElementById('mTitle').textContent = day.t;
  document.getElementById('mDesc').textContent = day.d;
  document.getElementById('rPhoto').href = pin(day.p);
  document.getElementById('rSketch').href = pin(day.s);

  refreshDoneBtn();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  activeDay = null;
}

function refreshDoneBtn() {
  const btn = document.getElementById('btnDone');
  if (completed.has(activeDay)) {
    btn.textContent = '✓ Completado';
    btn.classList.add('is-done');
  } else {
    btn.textContent = 'Marcar como completado';
    btn.classList.remove('is-done');
  }
}

function toggleDone() {
  if (!activeDay) return;
  if (completed.has(activeDay)) completed.delete(activeDay);
  else completed.add(activeDay);
  localStorage.setItem('sk100_done', JSON.stringify([...completed]));
  refreshDoneBtn();
  renderCalendar();
}

// ═══════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════
document.getElementById('btnPrev').addEventListener('click', () => {
  if (viewMonth === 0) { viewYear--; viewMonth = 11; }
  else viewMonth--;
  renderCalendar();
});
document.getElementById('btnNext').addEventListener('click', () => {
  if (viewMonth === 11) { viewYear++; viewMonth = 0; }
  else viewMonth++;
  renderCalendar();
});
document.getElementById('btnClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.getElementById('btnDone').addEventListener('click', toggleDone);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ═══════════════════════════════════════
// INSTALL BANNER
// ═══════════════════════════════════════
(function() {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  const dismissed = localStorage.getItem('sk100_banner') === '1';

  if (isMobile && !isStandalone && !dismissed) {
    document.getElementById('installBanner').classList.add('visible');
  }
  document.getElementById('installDismiss').addEventListener('click', () => {
    document.getElementById('installBanner').classList.remove('visible');
    localStorage.setItem('sk100_banner', '1');
  });
})();

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderCalendar();
</script>
</body>
